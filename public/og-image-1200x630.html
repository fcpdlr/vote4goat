<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px;
  height: 630px;
  background: #0d0f18;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  overflow: hidden;
  position: relative;
}

/* Subtle glow */
.glow {
  position: absolute;
  width: 700px;
  height: 700px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(245,166,35,0.07) 0%, transparent 65%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

/* Grain texture overlay */
.grain {
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  opacity: 0.4;
}

.content {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
}

.crown {
  opacity: 0.95;
}

.wordmark {
  display: flex;
  align-items: baseline;
  gap: 0;
  font-size: 72px;
  font-weight: 900;
  letter-spacing: 6px;
  line-height: 1;
}

.vote { color: rgba(255,255,255,0.4); }
.four { color: #f5a623; }
.goat { color: #ffffff; }

.tagline {
  font-size: 18px;
  color: rgba(255,255,255,0.25);
  letter-spacing: 0.3em;
  text-transform: uppercase;
  font-weight: 400;
}

.url {
  font-size: 15px;
  color: rgba(245,166,35,0.5);
  letter-spacing: 0.15em;
}
</style>
</head>
<body>
<div class="glow"></div>
<div class="grain"></div>

<div class="content">

  <!-- Crown SVG — original symmetric outline with orange jewel -->
  <svg class="crown" width="160" height="140" viewBox="0 0 64 56" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M6 46 L6 28 L18 40 L32 10 L46 40 L58 28 L58 46 Z" stroke="white" stroke-width="2" stroke-linejoin="round" fill="none"/>
    <line x1="6" y1="46" x2="58" y2="46" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <circle cx="32" cy="30" r="3.5" fill="#f5a623"/>
    <circle cx="14" cy="42" r="2" fill="#f5a623" opacity="0.5"/>
    <circle cx="50" cy="42" r="2" fill="#f5a623" opacity="0.5"/>
  </svg>

  <div class="wordmark">
    <span class="vote">VOTE</span><span class="four">4</span><span class="goat">GOAT</span>
  </div>

  <div class="tagline">The world decides</div>

  <div class="url">vote4goat.com</div>

</div>
</body>
</html>
